name: ci-and-publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  # ✅ Tu modifies juste ça manuellement quand tu veux publier une nouvelle version
  PACKAGE_VERSION: "1.0.1-alpha.4"

permissions:
  contents: read

jobs:
  ci_and_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore DomainRelay.slnx

      - name: Build
        run: dotnet build DomainRelay.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DomainRelay.slnx -c Release --no-build

      - name: Pack
        run: |
          echo "Publishing version: $PACKAGE_VERSION"
          dotnet pack DomainRelay.slnx -c Release --no-build \
            /p:PackageVersion=$PACKAGE_VERSION \
            /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg \
            -o ./artifacts

      - name: Push packages to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push symbols to NuGet
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
            