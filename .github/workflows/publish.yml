name: ci-and-publish

on:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version (e.g. 1.2.3-alpha.4). If empty, derived from tag vX.Y.Z..."
        required: false
        type: string
  push:
    branches: [ "main" ]
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore DomainRelay.slnx

      - name: Build
        run: dotnet build DomainRelay.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DomainRelay.slnx -c Release --no-build

  publish_nuget:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore DomainRelay.slnx

      - name: Build
        run: dotnet build DomainRelay.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DomainRelay.slnx -c Release --no-build

      - name: Pack
        run: |
          dotnet pack DomainRelay.slnx -c Release --no-build \
            /p:PackageVersion=${{ steps.ver.outputs.version }} \
            /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg \
            -o ./artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push symbols to NuGet
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
