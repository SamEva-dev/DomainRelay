name: ci-and-publish

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      packageVersion:
        description: "NuGet package version"
        required: true
        default: "0.10.0"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore packages
        shell: bash
        run: |
          set -euo pipefail

          dotnet restore src/DomainRelay.Abstractions/DomainRelay.Abstractions.csproj
          dotnet restore src/DomainRelay/DomainRelay.csproj
          dotnet restore src/DomainRelay.DependencyInjection/DomainRelay.DependencyInjection.csproj
          dotnet restore src/DomainRelay.Diagnostics/DomainRelay.Diagnostics.csproj
          dotnet restore src/DomainRelay.Validation/DomainRelay.Validation.csproj
          dotnet restore src/DomainRelay.EFCore/DomainRelay.EFCore.csproj
          dotnet restore src/DomainRelay.Transport.RabbitMQ/DomainRelay.Transport.RabbitMQ.csproj

          dotnet restore src/Mapping/DomainRelay.Mapping.Abstractions/DomainRelay.Mapping.Abstractions.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping/DomainRelay.Mapping.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping.DependencyInjection/DomainRelay.Mapping.DependencyInjection.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping.Expressions/DomainRelay.Mapping.Expressions.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping.SourceGen/DomainRelay.Mapping.SourceGen.csproj

          dotnet restore tests/DomainRelay.Tests/DomainRelay.Tests.csproj
          dotnet restore tests/Mapping/DomainRelay.Mapping.Tests/DomainRelay.Mapping.Tests.csproj
          dotnet restore tests/Mapping/DomainRelay.Mapping.DependencyInjection.Tests/DomainRelay.Mapping.DependencyInjection.Tests.csproj
          dotnet restore tests/Mapping/DomainRelay.Mapping.Expressions.Tests/DomainRelay.Mapping.Expressions.Tests.csproj
          dotnet restore tests/Mapping/DomainRelay.Mapping.SourceGen.Tests/DomainRelay.Mapping.SourceGen.Tests.csproj

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          dotnet build src/DomainRelay.Abstractions/DomainRelay.Abstractions.csproj -c Release --no-restore
          dotnet build src/DomainRelay/DomainRelay.csproj -c Release --no-restore
          dotnet build src/DomainRelay.DependencyInjection/DomainRelay.DependencyInjection.csproj -c Release --no-restore
          dotnet build src/DomainRelay.Diagnostics/DomainRelay.Diagnostics.csproj -c Release --no-restore
          dotnet build src/DomainRelay.Validation/DomainRelay.Validation.csproj -c Release --no-restore
          dotnet build src/DomainRelay.EFCore/DomainRelay.EFCore.csproj -c Release --no-restore
          dotnet build src/DomainRelay.Transport.RabbitMQ/DomainRelay.Transport.RabbitMQ.csproj -c Release --no-restore

          dotnet build src/Mapping/DomainRelay.Mapping.Abstractions/DomainRelay.Mapping.Abstractions.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping/DomainRelay.Mapping.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping.DependencyInjection/DomainRelay.Mapping.DependencyInjection.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping.Expressions/DomainRelay.Mapping.Expressions.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping.SourceGen/DomainRelay.Mapping.SourceGen.csproj -c Release --no-restore

      - name: Test
        shell: bash
        run: |
          set -euo pipefail

          dotnet test tests/DomainRelay.Tests/DomainRelay.Tests.csproj -c Release --no-restore
          dotnet test tests/Mapping/DomainRelay.Mapping.Tests/DomainRelay.Mapping.Tests.csproj -c Release --no-restore
          dotnet test tests/Mapping/DomainRelay.Mapping.DependencyInjection.Tests/DomainRelay.Mapping.DependencyInjection.Tests.csproj -c Release --no-restore
          dotnet test tests/Mapping/DomainRelay.Mapping.Expressions.Tests/DomainRelay.Mapping.Expressions.Tests.csproj -c Release --no-restore
          dotnet test tests/Mapping/DomainRelay.Mapping.SourceGen.Tests/DomainRelay.Mapping.SourceGen.Tests.csproj -c Release --no-restore

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest

    env:
      PACKAGE_VERSION: '3.0.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore packages
        shell: bash
        run: |
          set -euo pipefail

          dotnet restore src/DomainRelay.Abstractions/DomainRelay.Abstractions.csproj
          dotnet restore src/DomainRelay/DomainRelay.csproj
          dotnet restore src/DomainRelay.DependencyInjection/DomainRelay.DependencyInjection.csproj
          dotnet restore src/DomainRelay.Diagnostics/DomainRelay.Diagnostics.csproj
          dotnet restore src/DomainRelay.Validation/DomainRelay.Validation.csproj
          dotnet restore src/DomainRelay.EFCore/DomainRelay.EFCore.csproj
          dotnet restore src/DomainRelay.Transport.RabbitMQ/DomainRelay.Transport.RabbitMQ.csproj

          dotnet restore src/Mapping/DomainRelay.Mapping.Abstractions/DomainRelay.Mapping.Abstractions.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping/DomainRelay.Mapping.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping.DependencyInjection/DomainRelay.Mapping.DependencyInjection.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping.Expressions/DomainRelay.Mapping.Expressions.csproj
          dotnet restore src/Mapping/DomainRelay.Mapping.SourceGen/DomainRelay.Mapping.SourceGen.csproj

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          dotnet build src/DomainRelay.Abstractions/DomainRelay.Abstractions.csproj -c Release --no-restore
          dotnet build src/DomainRelay/DomainRelay.csproj -c Release --no-restore
          dotnet build src/DomainRelay.DependencyInjection/DomainRelay.DependencyInjection.csproj -c Release --no-restore
          dotnet build src/DomainRelay.Diagnostics/DomainRelay.Diagnostics.csproj -c Release --no-restore
          dotnet build src/DomainRelay.Validation/DomainRelay.Validation.csproj -c Release --no-restore
          dotnet build src/DomainRelay.EFCore/DomainRelay.EFCore.csproj -c Release --no-restore
          dotnet build src/DomainRelay.Transport.RabbitMQ/DomainRelay.Transport.RabbitMQ.csproj -c Release --no-restore

          dotnet build src/Mapping/DomainRelay.Mapping.Abstractions/DomainRelay.Mapping.Abstractions.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping/DomainRelay.Mapping.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping.DependencyInjection/DomainRelay.Mapping.DependencyInjection.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping.Expressions/DomainRelay.Mapping.Expressions.csproj -c Release --no-restore
          dotnet build src/Mapping/DomainRelay.Mapping.SourceGen/DomainRelay.Mapping.SourceGen.csproj -c Release --no-restore

      - name: Pack NuGet packages
        shell: bash
        run: |
          set -euo pipefail

          echo "Publishing version: $PACKAGE_VERSION"
          mkdir -p ./artifacts

          dotnet pack src/DomainRelay.Abstractions/DomainRelay.Abstractions.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/DomainRelay/DomainRelay.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/DomainRelay.DependencyInjection/DomainRelay.DependencyInjection.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/DomainRelay.Diagnostics/DomainRelay.Diagnostics.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/DomainRelay.Validation/DomainRelay.Validation.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/DomainRelay.EFCore/DomainRelay.EFCore.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/DomainRelay.Transport.RabbitMQ/DomainRelay.Transport.RabbitMQ.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts

          dotnet pack src/Mapping/DomainRelay.Mapping.Abstractions/DomainRelay.Mapping.Abstractions.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/Mapping/DomainRelay.Mapping/DomainRelay.Mapping.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/Mapping/DomainRelay.Mapping.DependencyInjection/DomainRelay.Mapping.DependencyInjection.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/Mapping/DomainRelay.Mapping.Expressions/DomainRelay.Mapping.Expressions.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts
          dotnet pack src/Mapping/DomainRelay.Mapping.SourceGen/DomainRelay.Mapping.SourceGen.csproj -c Release --no-build /p:PackageVersion=$PACKAGE_VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o ./artifacts

      - name: Push packages to NuGet
        shell: bash
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push symbols to NuGet
        shell: bash
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate