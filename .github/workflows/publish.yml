name: ci-and-publish

on:
  pull_request:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish_nuget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Extract version from tag
        id: ver
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore DomainRelay.slnx

      - name: Build
        run: dotnet build DomainRelay.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DomainRelay.slnx -c Release --no-build

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet pack DomainRelay.slnx -c Release --no-build \
            /p:PackageVersion=${{ steps.ver.outputs.version }} \
            /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg \
            -o ./artifacts

      - name: Push to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
